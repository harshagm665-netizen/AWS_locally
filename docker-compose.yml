# ==============================================================================
# AWS Locally with Floci — Docker Compose Configuration
# ==============================================================================
# Floci: Fast, free, open-source AWS emulator. MIT Licensed.
# https://floci.io
#
# Usage:
#   docker compose up -d     # Start Floci
#   docker compose down      # Stop Floci
#   docker compose logs -f   # Stream logs
#
# All AWS services accessible at:  http://localhost:4566
# ==============================================================================

services:
  floci:
    image: floci/floci:latest
    container_name: floci-aws
    hostname: floci
    restart: unless-stopped

    ports:
      # ── Single gateway port for ALL AWS services ──
      - "4566:4566"

    environment:
      # ── Logging ──
      - FLOCI_LOG_LEVEL=${FLOCI_LOG_LEVEL:-info}

      # ── Persistence ──
      - FLOCI_DATA_DIR=/var/lib/floci

      # ── AWS defaults (used by init scripts inside the container) ──
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}

    volumes:
      # ── Persistent data (survives container restarts) ──
      - "./data:/var/lib/floci"

      # ── Docker socket (required for Lambda, ECS, EC2, RDS) ──
      - "/var/run/docker.sock:/var/run/docker.sock"

      # ── Init scripts (auto-execute on startup) ──
      - "./init-scripts:/etc/floci/init/ready.d"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_floci/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - floci-net

networks:
  floci-net:
    driver: bridge
    name: floci-network
