AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS LocalStack Full Stack Template — Provisions S3, DynamoDB, SQS, SNS,
  Lambda, and wires them together with IAM roles and event source mappings.
  Compatible with both LocalStack and real AWS.

# ==============================================================================
#  PARAMETERS
# ==============================================================================
Parameters:
  EnvironmentName:
    Type: String
    Default: demo
    AllowedValues: [demo, dev, staging, production]
    Description: Environment name for resource tagging and naming

  ProjectName:
    Type: String
    Default: localstack-demo
    Description: Project name prefix for all resources

# ==============================================================================
#  RESOURCES
# ==============================================================================
Resources:

  # ────────────────────────────────────────────────────────────────────────────
  #  S3 BUCKETS
  # ────────────────────────────────────────────────────────────────────────────
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-data-${EnvironmentName}'
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Service
          Value: storage

  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-logs-${EnvironmentName}'
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Service
          Value: logging

  # ────────────────────────────────────────────────────────────────────────────
  #  DYNAMODB TABLES
  # ────────────────────────────────────────────────────────────────────────────
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-users-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-events-${EnvironmentName}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ────────────────────────────────────────────────────────────────────────────
  #  SQS QUEUES
  # ────────────────────────────────────────────────────────────────────────────
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-dlq-${EnvironmentName}'
      MessageRetentionPeriod: 1209600  # 14 days

  TaskQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${ProjectName}-tasks-${EnvironmentName}'
      VisibilityTimeout: 60
      MessageRetentionPeriod: 345600  # 4 days
      ReceiveMessageWaitTimeSeconds: 10
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  # ────────────────────────────────────────────────────────────────────────────
  #  SNS TOPICS
  # ────────────────────────────────────────────────────────────────────────────
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-notifications-${EnvironmentName}'
      DisplayName: App Notifications
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # Subscribe SQS queue to SNS topic
  QueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref NotificationTopic
      Protocol: sqs
      Endpoint: !GetAtt TaskQueue.Arn
      RawMessageDelivery: true

  # ────────────────────────────────────────────────────────────────────────────
  #  IAM — Lambda Execution Role
  # ────────────────────────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role-${EnvironmentName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UsersTable.Arn
                  - !GetAtt EventsTable.Arn
                  - !Sub '${UsersTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt TaskQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic

  # ────────────────────────────────────────────────────────────────────────────
  #  SECRETS MANAGER
  # ────────────────────────────────────────────────────────────────────────────
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/config/${EnvironmentName}'
      Description: Application configuration secrets
      SecretString: !Sub |
        {
          "db_host": "localhost",
          "db_port": "5432",
          "db_name": "${ProjectName}_${EnvironmentName}",
          "api_key": "demo-api-key-12345"
        }
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

# ==============================================================================
#  OUTPUTS
# ==============================================================================
Outputs:
  DataBucketName:
    Description: S3 data bucket name
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  LogsBucketName:
    Description: S3 logs bucket name
    Value: !Ref LogsBucket

  UsersTableName:
    Description: DynamoDB Users table name
    Value: !Ref UsersTable
    Export:
      Name: !Sub '${AWS::StackName}-UsersTable'

  EventsTableName:
    Description: DynamoDB Events table name
    Value: !Ref EventsTable

  TaskQueueUrl:
    Description: SQS task queue URL
    Value: !Ref TaskQueue
    Export:
      Name: !Sub '${AWS::StackName}-TaskQueue'

  TaskQueueArn:
    Description: SQS task queue ARN
    Value: !GetAtt TaskQueue.Arn

  DeadLetterQueueUrl:
    Description: SQS dead-letter queue URL
    Value: !Ref DeadLetterQueue

  NotificationTopicArn:
    Description: SNS notification topic ARN
    Value: !Ref NotificationTopic
    Export:
      Name: !Sub '${AWS::StackName}-NotificationTopic'

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaRole'

  SecretArn:
    Description: Secrets Manager secret ARN
    Value: !Ref AppSecret
