# ==============================================================================
# AWS LocalStack — Docker Compose Configuration
# ==============================================================================
# Professional-grade local AWS emulation environment.
#
# Usage:
#   docker-compose up -d          # Start LocalStack
#   docker-compose down           # Stop LocalStack
#   docker-compose logs -f        # Stream logs
#
# All AWS services are accessible via:  http://localhost:4566
# ==============================================================================

services:
  localstack:
    image: localstack/localstack:4.0
    container_name: aws-localstack
    hostname: localstack
    restart: unless-stopped

    ports:
      # ── Edge Port (single gateway for ALL AWS services) ──
      - "4566:4566"
      # ── External service port range ──
      - "4510-4559:4510-4559"

    environment:
      # ── Core Configuration ──
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-localstack}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-localstack}

      # ── Service Configuration ──
      - SERVICES=s3,dynamodb,sqs,sns,lambda,apigateway,iam,cloudformation,ec2,secretsmanager,stepfunctions,kinesis,events
      - EAGER_SERVICE_LOADING=1

      # ── Persistence (survive container restarts) ──
      - PERSISTENCE=${PERSISTENCE:-1}

      # ── Lambda Configuration ──
      - LAMBDA_EXECUTOR=${LAMBDA_EXECUTOR:-docker}
      - LAMBDA_REMOTE_DOCKER=0
      - DOCKER_HOST=unix:///var/run/docker.sock

      # ── Debugging ──
      - DEBUG=${DEBUG:-0}
      - LS_LOG=${LS_LOG:-warn}

    volumes:
      # ── Persistent data storage ──
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      # ── Docker socket (required for Lambda containers) ──
      - "/var/run/docker.sock:/var/run/docker.sock"
      # ── Initialization scripts (auto-execute on startup) ──
      - "./init-scripts:/etc/localstack/init/ready.d"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - localstack-net

networks:
  localstack-net:
    driver: bridge
    name: localstack-network
